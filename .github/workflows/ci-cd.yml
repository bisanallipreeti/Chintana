name: CI-CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  expo-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-expo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-expo/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:web
        env:
          EXPO_PUBLIC_API_BASE_URL: https://api.example.com/api/v1

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, expo-typecheck]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: chintana-backend:ci
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend-expo
          push: false
          build-args: |
            EXPO_PUBLIC_API_BASE_URL=https://api.example.com/api/v1
          tags: chintana-frontend:ci

  deploy-aws:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && secrets.AWS_ROLE_TO_ASSUME != '' && secrets.AWS_REGION != '' && secrets.ECR_REPOSITORY_BACKEND != '' && secrets.ECR_REPOSITORY_FRONTEND != '' && secrets.ECS_CLUSTER != '' && secrets.ECS_SERVICE_BACKEND != '' && secrets.ECS_SERVICE_FRONTEND != ''
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY_BACKEND }}:latest ./backend
          docker push ${{ secrets.ECR_REPOSITORY_BACKEND }}:latest
      - name: Build and push frontend image
        run: |
          docker build --build-arg EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }} -t ${{ secrets.ECR_REPOSITORY_FRONTEND }}:latest ./frontend-expo
          docker push ${{ secrets.ECR_REPOSITORY_FRONTEND }}:latest
      - name: Force ECS rollout
        run: |
          aws ecs update-service --cluster ${{ secrets.ECS_CLUSTER }} --service ${{ secrets.ECS_SERVICE_BACKEND }} --force-new-deployment
          aws ecs update-service --cluster ${{ secrets.ECS_CLUSTER }} --service ${{ secrets.ECS_SERVICE_FRONTEND }} --force-new-deployment
